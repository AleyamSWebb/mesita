<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
<nav th:replace="~{layout/plantilla :: navbar}"></nav>

<div class="container mt-4">
    <h2>Registrar Nuevo Proveedor</h2>
    <form th:action="@{/proveedores/guardar}" th:object="${proveedor}" method="post" class="mt-3">
        <div class="mb-3">
            <label>Nombre de la Empresa</label>
            <input type="text" class="form-control" th:field="*{nombreEmpresa}" required>
        </div>
        <div class="mb-3">
            <label>Cédula Jurídica</label>
            <input type="text" class="form-control" th:field="*{cedulaJuridica}">
        </div>
        <div class="mb-3">
            <label>Categoría</label>
            <input type="text" class="form-control" th:field="*{categoria}">
        </div>
        <div class="mb-3">
            <label>Teléfono</label>
            <input type="text" class="form-control" th:field="*{telefono}">
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/proveedores}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
