<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario - Carnicería Las Mesitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h3 class="card-title text-center mb-0">🍖 Registrar / Editar Corte</h3>
                </div>
                <div class="card-body">

                    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

                        <input type="hidden" th:field="*{idProducto}">

                        <div class="mb-3">
                            <label class="form-label">Nombre del Corte:</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Categoría (Res, Cerdo, Pollo, etc.):</label>
                            <input type="text" class="form-control" th:field="*{categoria}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción:</label>
                            <textarea class="form-control" th:field="*{descripcion}" rows="2"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio (₡):</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cantidad en Stock:</label>
                                <input type="number" class="form-control" th:field="*{cantidadStock}" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success">Guardar Producto</button>
                            <a th:href="@{/productos}" class="btn btn-secondary">Cancelar y Volver</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
