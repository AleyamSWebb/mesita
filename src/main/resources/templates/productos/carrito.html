<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras - Carnicería Mesitas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-carniceria { background-color: #a41d1d; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body class="container py-5">

<div class="card">
    <div class="header-carniceria text-center">
        <h1>🥩 Carnicería Mesitas</h1>
        <p class="mb-0">Resumen de tu pedido</p>
    </div>

    <div class="card-body p-4">
        <h3 class="mb-4">🛒 Tu Carrito</h3>

        <table class="table table-hover">
            <thead class="table-light">
            <tr>
                <th>Producto</th>
                <th>Categoría</th>
                <th class="text-end">Precio</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${items}">
                <td th:text="${p.nombre}">Nombre del Producto</td>
                <td th:text="${p.categoria}">Categoría</td>
                <td class="text-end" th:text="'$' + ${p.precio}">$0.00</td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="3" class="text-center text-muted">No hay productos en el carrito.</td>
            </tr>
            </tbody>
            <tfoot>
            <tr class="table-info">
                <td colspan="2" class="fw-bold">TOTAL A PAGAR</td>
                <td class="text-end fw-bold" th:text="'$' + ${total}">$0.00</td>
            </tr>
            </tfoot>
        </table>

        <div class="d-flex justify-content-between mt-4">
            <a th:href="@{/productos}" class="btn btn-outline-secondary">
                ← Seguir comprando
            </a>
            <button class="btn btn-danger" onclick="alert('¡Compra registrada con éxito!')">
                Finalizar Compra
            </button>
        </div>
    </div>
</div>

</body>
</html>
